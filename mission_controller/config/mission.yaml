mission_controller:
  ros__parameters:
    execute_grasp_action_name: /execute_grasp
    execute_place_action_name: /execute_place
    execute_box_grasp_action_name: /execute_box_grasp
    execute_box_place_action_name: /execute_box_place
    detect_service_name: /detect_grasp_pose
    box_detect_service_name: /detect_box_grasp_pose
    box_mission_enabled: true
    # Box perception uses FoundationPose. Normal /execute_grasp continues to
    # use grasp_ws through detect_service_name above.
    box_object_pose_action_name: /object_pose/estimate
    box_object_pose_topic: /mission/box_object_pose
    # Debug/verification path: raw FoundationPose input and the same pose after
    # camera->torso TF only. No object-axis remapping or geometric-centre shift.
    box_object_pose_camera_topic: /object_pose/pose
    box_object_pose_raw_topic: /mission/box_object_pose_raw
    box_object_pose_model_label: f320
    box_object_pose_instance_index: 0
    box_object_pose_confidence_threshold: 0.0
    box_object_pose_result_timeout_sec: 60.0
    # Mission transforms the FoundationPose result into torso_link4, then the
    # existing dual-arm pickup task computes the two hand targets from the box
    # dimensions. These are the validated F320 mesh extents for width/height.
    pickup_task_action_name: /pickup_task
    pickup_task_result_timeout_sec: 120.0
    box_width: 0.357
    box_height: 0.127
    box_type: f320
    # Preserve the FoundationPose F320 model axes (X=down, Y=depth, Z=width)
    # after camera->torso TF. The r1_pro pickup profile owns the single fixed
    # box-frame->operation-frame correction, so applying another remap here
    # would rotate the target twice. Position remains the geometric centre.
    box_foundation_to_pickup_rpy: [0.0, 0.0, 0.0]
    arm_pose_action_name: /move_arm_p
    arm_joints_service_name: /move_arm_j
    home_service_name: /home
    go_ready_action_name: /go_ready
    # Mission owns all perception-frame conversions. move_arm_p receives only
    # an absolute arm_link7 target expressed in arm_execution_frame.
    grasp_pose_topic: /mission/grasp_pose
    grasp_pose_camera_topic: /mission/grasp_pose_camera
    grasp_pose_ee_topic: /mission/grasp_pose_ee
    gripper_target_pose_topic: /mission/gripper_link_target
    arm_target_pose_topic: /mission/arm_link7_target
    arm_intermediate_pose_topic: /mission/arm_link7_intermediate
    grasp_visualization_topic: /mission/grasp_visualization
    # Safe visualization-only input. Publishing here computes and displays the
    # transform chain but never calls move_arm_j or move_arm_p.
    preview_grasp_pose_topic: /mission/preview_grasp_pose
    preview_arm: right

    torso_topic: /motion_target/target_joint_state_torso
    left_gripper_topic: /motion_target/target_position_gripper_left
    right_gripper_topic: /motion_target/target_position_gripper_right
    chassis_topic: /motion_target/target_speed_chassis
    joint_state_topic: /joint_states
    left_arm_joint_names: [left_arm_joint1, left_arm_joint2, left_arm_joint3, left_arm_joint4, left_arm_joint5, left_arm_joint6, left_arm_joint7]
    right_arm_joint_names: [right_arm_joint1, right_arm_joint2, right_arm_joint3, right_arm_joint4, right_arm_joint5, right_arm_joint6, right_arm_joint7]

    # Do not start perception merely because /move_arm_j returned. Require the
    # measured arm posture to remain within tolerance for fresh feedback samples.
    verify_arm_joint_targets: true
    arm_joint_target_tolerance: 0.10
    arm_joint_target_wait_timeout_sec: 20.0
    arm_joint_target_stable_samples: 3

    default_arm: right
    default_target_frame: torso_link4
    arm_execution_frame: torso_link4
    left_ee_frame: left_arm_link7
    right_ee_frame: right_arm_link7
    left_gripper_frame: left_gripper_link
    right_gripper_frame: right_gripper_link
    # Approximate grasp-center-to-gripper tool length along corrected local -X.
    # gripper_link -> arm_link7 is read separately from the URDF TF.
    grasp_center_to_gripper_xyz: [-0.03, 0.0, 0.0]
    # X is already the correct approach axis; rotate 180 degrees around local
    # X so the displayed and commanded Y/Z axes match the physical gripper.
    grasp_pose_correction_rpy: [3.141592653589793, 0.0, 0.0]
    # A parallel-jaw grasp is symmetric under a 180-degree rotation about the
    # GraspNet approach axis. Select the equivalent branch closest to the
    # current gripper orientation so the wrist camera stays on the same side.
    grasp_symmetry_normalization_enabled: true
    grasp_symmetry_rpy: [3.141592653589793, 0.0, 0.0]
    # GraspNet +X aligns with gripper -Z; both +Y axes are the finger
    # opening/closing direction.
    grasp_to_gripper_rpy: [0.0, -1.5707963267948966, 0.0]
    # After the axis mapping, tilt the target gripper 25 degrees backward about
    # its local Y axis, then retain the 180-degree local-Z palm flip. This only
    # changes the gripper orientation; the perceived grasp pose and grasp-center
    # position remain unchanged.
    gripper_target_post_rpy: [0.0, -0.4363323129985824, 3.141592653589793]
    camera_mount_tf_enabled: true
    # flange -> gripper -> D405 is provided by robot_state_publisher from URDF.
    # Mission only connects the CAD D405 axes to the RealSense ROS camera axes.
    camera_mount_parent_frame: right_D405_link
    # R1 Pro Realsense root frame. Its color/depth optical children are
    # published by /hdas/camera_wrist_right.
    camera_mount_child_frame: hdas/camera_wrist_right_link
    camera_mount_xyz: [0.0, 0.0, 0.0]
    # camera_link +X (and therefore optical +Z) = right_D405_link +Z.
    camera_mount_rpy: [-1.5707963267948966, -1.5707963267948966, 0.0]
    # The CAD D405 frame is rolled 180 degrees relative to the physical color
    # image: without this correction, optical -X (image left) appears on the
    # robot's right side. Keep optical +Z (camera forward) unchanged.
    camera_mount_correction_rpy: [0.0, 0.0, 3.141592653589793]
    camera_tf_timeout_sec: 2.0
    default_detection_timeout_sec: 20.0
    # Try the two highest-scoring candidates from one image. If both fail, or
    # stage 2 fails after stage 1 moved the wrist camera, detect once more.
    grasp_detection_attempts: 2
    grasp_candidates_per_detection: 2
    dependency_wait_timeout_sec: 10.0
    arm_joints_result_timeout_sec: 60.0
    arm_pose_result_timeout_sec: 120.0
    home_result_timeout_sec: 60.0
    go_ready_result_timeout_sec: 60.0

    # Match r1pro_test: wait, warn, then publish. Set require=true for strict mode.
    wait_for_command_subscribers: true
    require_command_subscribers: false
    command_subscriber_wait_timeout_sec: 3.0
    command_repeat_count: 10
    command_repeat_interval_sec: 0.005
    torso_settle_sec: 1.0
    arm_settle_sec: 1.0
    gripper_settle_sec: 1.0

    # Use the same deeper waist observation posture as execute_box_grasp so
    # the material grasp target remains inside the right-arm reachable space.
    torso_prepare_positions: [0.61, -0.81, -0.60, 0.0]
    torso_reset_positions: [0.0, 0.0, 0.0, 0.0]
    torso_velocities: [0.1, 0.1, 0.1, 0.1]

    # Shared collision-clearance posture before either observation pose.
    observation_intermediate_left_joint_positions: [1.30, 0.6, 0.0, -1.5, 0.0, 0.0, 0.0]
    observation_intermediate_right_joint_positions: [1.30, -0.6, 0.0, -1.5, 0.0, 0.0, 0.0]

    grasp_left_joint_positions: [-0.98, 0.84, -0.83, -2.00, 1.25, 0.29, 0.13]
    grasp_right_joint_positions: [-0.98, -0.84, 0.93, -2.00, -1.25, 0.60, -0.13]
    place_right_joint_positions: [-1.011, 0.040, 0.835, -0.9513, -1.956, 0.901, -1.370]

    # Initial dual-arm observation posture for execute_box_grasp.
    box_grasp_left_observation_joint_positions: [-0.88, 1.24, -0.70, -2.0, 1.25, 0.1, 0.0]
    box_grasp_right_observation_joint_positions: [0.86, -0.24, 0.20, -2.0944, 0.174647, -0.618606, 0.104098]
    box_grasp_torso_prepare_positions: [0.61, -0.81, -0.6, 0.0]
    # After both grippers close, lift from the shared deep observation bend to
    # the shallower carry posture. Box placement returns to the deep posture
    # before opening both grippers.
    box_grasp_torso_lift_positions: [0.61, -0.81, -0.21, 0.0]
    box_place_torso_positions: [0.61, -0.81, -0.6, 0.0]
    # R1 Pro base convention: -Y is robot-right. Move 0.5 m over 5 seconds.
    box_place_chassis_distance_x: 0.0
    box_place_chassis_distance_y: -0.5
    box_place_chassis_yaw: 0.0
    box_place_chassis_duration_sec: 5.0

    gripper_open_position: 100.0
    gripper_closed_position: 0.0
    open_gripper_before_grasp: true

    # Calibrate these fixed-location values before running on hardware.
    place_chassis_distance_x: -0.5
    place_chassis_distance_y: 0.0
    place_chassis_yaw: 0.0
    place_chassis_duration_sec: 5.0
    chassis_publish_hz: 10.0
    chassis_stop_repeat_count: 1
    max_chassis_linear_speed: 0.2
    max_chassis_angular_speed: 0.4

    home_velocity: 0.05
