mission_controller:
  ros__parameters:
    execute_grasp_action_name: /execute_grasp
    execute_place_action_name: /execute_place
    execute_bin_grasp_action_name: /execute_bin_grasp
    execute_bin_place_action_name: /execute_bin_place
    detect_service_name: /detect_grasp_pose
    bin_detect_service_name: /detect_bin_grasp_pose
    bin_mission_enabled: true
    # Bin perception uses FoundationPose. Normal /execute_grasp continues to
    # use grasp_ws through detect_service_name above.
    bin_object_pose_action_name: /object_pose/estimate
    bin_object_pose_topic: /mission/bin_object_pose
    # Debug/verification path: raw FoundationPose input and the same pose after
    # camera->torso TF only. No object-axis remapping or geometric-centre shift.
    bin_object_pose_camera_topic: /object_pose/pose
    bin_object_pose_raw_topic: /mission/bin_object_pose_raw
    bin_object_pose_model_label: f320
    bin_object_pose_instance_index: 0
    bin_object_pose_confidence_threshold: 0.0
    bin_object_pose_result_timeout_sec: 60.0
    # Mission transforms the FoundationPose result into torso_link4, then the
    # existing dual-arm pickup task computes the two hand targets from the box
    # dimensions. These are the validated F320 mesh extents for width/height.
    pickup_task_action_name: /pickup_task
    pickup_task_result_timeout_sec: 120.0
    bin_box_width: 0.357
    bin_box_height: 0.127
    bin_box_type: f320
    # Preserve the FoundationPose F320 model axes (X=down, Y=depth, Z=width)
    # after camera->torso TF. The r1_pro pickup profile owns the single fixed
    # box-frame->operation-frame correction, so applying another remap here
    # would rotate the target twice. Position remains the geometric centre.
    bin_foundation_to_pickup_rpy: [0.0, 0.0, 0.0]
    arm_pose_action_name: /move_arm_p
    arm_joints_service_name: /move_arm_j
    home_service_name: /home
    # Mission owns all perception-frame conversions. move_arm_p receives only
    # an absolute arm_link7 target expressed in arm_execution_frame.
    grasp_pose_topic: /mission/grasp_pose
    grasp_pose_camera_topic: /mission/grasp_pose_camera
    grasp_pose_ee_topic: /mission/grasp_pose_ee
    gripper_target_pose_topic: /mission/gripper_link_target
    arm_target_pose_topic: /mission/arm_link7_target
    grasp_visualization_topic: /mission/grasp_visualization
    # Safe visualization-only input. Publishing here computes and displays the
    # transform chain but never calls move_arm_j or move_arm_p.
    preview_grasp_pose_topic: /mission/preview_grasp_pose
    preview_arm: right

    torso_topic: /motion_target/target_joint_state_torso
    left_gripper_topic: /motion_target/target_position_gripper_left
    right_gripper_topic: /motion_target/target_position_gripper_right
    chassis_topic: /motion_target/target_speed_chassis

    default_arm: right
    default_target_frame: torso_link4
    arm_execution_frame: torso_link4
    left_ee_frame: left_arm_link7
    right_ee_frame: right_arm_link7
    left_gripper_frame: left_gripper_link
    right_gripper_frame: right_gripper_link
    # GraspNet reports the grasp center. Place the gripper link 15 cm backward
    # along local -X; gripper_link -> arm_link7 is read separately from URDF TF.
    grasp_center_to_gripper_xyz: [-0.15, 0.0, 0.0]
    # X is already the correct approach axis; rotate 180 degrees around local
    # X so the displayed and commanded Y/Z axes match the physical gripper.
    grasp_pose_correction_rpy: [3.141592653589793, 0.0, 0.0]
    # GraspNet +X aligns with gripper -Z; both +Y axes are the finger
    # opening/closing direction.
    grasp_to_gripper_rpy: [0.0, -1.5707963267948966, 0.0]
    # After the axis mapping, rotate the target gripper 180 degrees around its
    # own local Z axis. This flips the palm direction without moving the grasp
    # center or changing the 15 cm retreat vector.
    gripper_target_post_rpy: [0.0, 0.0, 3.141592653589793]
    camera_mount_tf_enabled: true
    # flange -> gripper -> D405 is provided by robot_state_publisher from URDF.
    # Mission only connects the CAD D405 axes to the RealSense ROS camera axes.
    camera_mount_parent_frame: right_D405_link
    camera_mount_child_frame: d405_link
    camera_mount_xyz: [0.0, 0.0, 0.0]
    # camera_link +X (and therefore optical +Z) = right_D405_link +Z.
    camera_mount_rpy: [-1.5707963267948966, -1.5707963267948966, 0.0]
    # The CAD D405 frame is rolled 180 degrees relative to the physical color
    # image: without this correction, optical -X (image left) appears on the
    # robot's right side. Keep optical +Z (camera forward) unchanged.
    camera_mount_correction_rpy: [0.0, 0.0, 3.141592653589793]
    camera_tf_timeout_sec: 2.0
    default_detection_timeout_sec: 20.0
    dependency_wait_timeout_sec: 10.0
    arm_joints_result_timeout_sec: 60.0
    arm_pose_result_timeout_sec: 120.0
    home_result_timeout_sec: 60.0

    # Match r1pro_test: wait, warn, then publish. Set require=true for strict mode.
    wait_for_command_subscribers: true
    require_command_subscribers: false
    command_subscriber_wait_timeout_sec: 3.0
    command_repeat_count: 10
    command_repeat_interval_sec: 0.005
    torso_settle_sec: 1.0
    arm_settle_sec: 1.0
    gripper_settle_sec: 1.0

    torso_prepare_positions: [0.61, -0.81, -0.21, 0.0]
    torso_reset_positions: [0.0, 0.0, 0.0, 0.0]
    torso_velocities: [0.2, 0.2, 0.2, 0.2]

    grasp_left_joint_positions: [-0.88, 0.84, -1.13, -1.80, 1.25, 0.29, 0.13]
    grasp_right_joint_positions: [-0.98, -0.64, 1.13, -1.60, -1.25, 0.6, -0.13]
    place_right_joint_positions: [-0.911, -0.270, 1.095, -1.193, -2.356, 0.801, -1.470]

    # Initial dual-arm observation posture for execute_bin_grasp.
    bin_grasp_left_observation_joint_positions: [-0.88, 0.84, -1.13, -1.80, 1.25, 0.29, 0.13]
    bin_grasp_right_observation_joint_positions: [0.16, -0.04, 0.20, -2.095894, 0.174647, -0.718606, -0.094098]
    bin_grasp_torso_prepare_positions: [0.61, -0.81, -0.6, 0.0]
    bin_place_torso_positions: [0.0, 0.0, 0.0, 0.0]
    bin_place_chassis_distance_x: 0.0
    bin_place_chassis_distance_y: 0.0
    bin_place_chassis_yaw: 0.0
    bin_place_chassis_duration_sec: 5.0

    gripper_open_position: 100.0
    gripper_closed_position: 0.0
    open_gripper_before_grasp: true

    # Calibrate these fixed-location values before running on hardware.
    place_chassis_distance_x: -0.5
    place_chassis_distance_y: 0.0
    place_chassis_yaw: 0.0
    place_chassis_duration_sec: 5.0
    chassis_publish_hz: 10.0
    chassis_stop_repeat_count: 1
    max_chassis_linear_speed: 0.2
    max_chassis_angular_speed: 0.4

    home_velocity: 0.05
