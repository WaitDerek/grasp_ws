mission_controller:
  ros__parameters:
    arm_execution_frame: torso_link
    left_ee_frame: torso_link
    right_ee_frame: torso_link
    left_gripper_frame: torso_link
    right_gripper_frame: torso_link
    camera_mount_tf_enabled: false
    bin_mission_enabled: true
    bin_foundation_to_pickup_rpy: [0.0, 0.0, 0.0]
    dependency_wait_timeout_sec: 2.0
    arm_joints_result_timeout_sec: 2.0
    arm_pose_result_timeout_sec: 2.0
    home_result_timeout_sec: 2.0
    require_command_subscribers: true
    command_subscriber_wait_timeout_sec: 2.0
    command_repeat_count: 2
    command_repeat_interval_sec: 0.005
    torso_settle_sec: 0.05
    arm_settle_sec: 0.05
    gripper_settle_sec: 0.05
    place_chassis_distance_x: -0.02
    place_chassis_distance_y: 0.0
    place_chassis_yaw: 0.0
    place_chassis_duration_sec: 0.2
    chassis_publish_hz: 20.0
    chassis_stop_repeat_count: 2
